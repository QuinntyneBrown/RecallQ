<h2 id="add-email-title">Add email</h2>
<form (ngSubmit)="save()">
  <input
    type="email"
    aria-label="Email"
    required
    [(ngModel)]="value"
    (ngModelChange)="onInput()"
    name="email"
    autofocus
  />
  @if (error()) { <div role="alert" class="err">{{ error() }}</div> }
  <div class="actions">
    <button type="button" (click)="cancel()">Cancel</button>
    <button type="submit" [disabled]="busy()">Save</button>
  </div>
</form>
