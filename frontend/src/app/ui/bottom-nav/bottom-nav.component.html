<nav aria-label="Main" class="bottom-nav">
  <span
    data-testid="health-dot"
    class="dot"
    [class.online]="online()"
    aria-hidden="true"
  ></span>
  <a routerLink="/home" routerLinkActive="active" aria-label="Home"><i class="ph ph-house"></i></a>
  <a routerLink="/search" routerLinkActive="active" aria-label="Search"><i class="ph ph-magnifying-glass"></i></a>
  <a routerLink="/ask" routerLinkActive="active" aria-label="Ask"><i class="ph ph-sparkle"></i></a>
  <div class="profile-wrap">
    <button type="button" aria-label="Profile" aria-haspopup="menu" [attr.aria-expanded]="menuOpen()" (click)="toggleMenu()"><i class="ph ph-user"></i></button>
    @if (menuOpen()) {
      <div role="menu" class="menu">
        <button role="menuitem" aria-label="Log out" type="button" (click)="logout()">Log out</button>
      </div>
    }
  </div>
</nav>
